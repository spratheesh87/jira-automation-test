name: Auto-Generate PR Description

on:
  pull_request:
    types: [opened]

jobs:
  update-pr-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Generate PR Description via OpenAI
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            // 1. Get the raw code diff from the Pull Request
            const { data: diff } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              mediaType: { format: 'diff' }
            });
            
            // 2. Build the exact prompt with your Jira template
            const prompt = `You are an expert software engineer. Summarize the following code diff into a Markdown PR description.
            You MUST format your response exactly like this:
            
            ### 1. The "Why" (Business Context)
            [Explain the business value]
            
            ### 2. Architectural Trade-offs & Technical Notes
            [Bullet points of technical changes]
            
            ### 3. Step-by-Step Testing Instructions for QA
            [Step by step instructions including Prerequisites, Happy Path, and Edge Cases]
            
            Here is the code diff:
            ${diff.substring(0, 4000)}`; // Caps the diff length to save AI tokens
            
            // 3. Send the diff to OpenAI
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'gpt-3.5-turbo',
                messages: [{ role: 'user', content: prompt }]
              })
            }).then(res => res.json());
            
            // 4. Update the empty PR description box!
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: response.choices[0].message.content
            });
